<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALANARAPATI E-FORM Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--primary:#2563eb;--bg:#f3f6fb;--card:#fff;--text:#1e293b}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{background:var(--bg);display:flex}
.sidebar{width:260px;background:linear-gradient(180deg,#1e40af,#2563eb);color:#fff;height:100vh;position:fixed;padding:20px}
.logo{font-size:22px;font-weight:700;margin-bottom:30px}
.menu a{display:block;color:#fff;text-decoration:none;padding:12px;border-radius:10px;margin:6px 0}
.menu a:hover{background:rgba(255,255,255,.15)}
.main{margin-left:260px;width:calc(100% - 260px)}
.topbar{background:#fff;padding:18px 25px;display:flex;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:20px}
.card{background:#fff;padding:20px;border-radius:16px;box-shadow:0 3px 12px rgba(0,0,0,.08)}
.big{grid-column:span 2}
table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #eee;text-align:left}
@media(max-width:900px){.grid{grid-template-columns:1fr}.big{grid-column:span 1}.sidebar{position:relative;width:100%;height:auto}.main{margin-left:0;width:100%}body{display:block}}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo">GALA SYSTEM</div>
<div class="menu">
<a href="#"><i class="fa fa-house"></i> Dashboard</a>
<a href="#"><i class="fa fa-users"></i> Anggota</a>
<a href="#"><i class="fa fa-calendar"></i> Presensi</a>
<a href="#"><i class="fa fa-envelope"></i> Persuratan</a>
<a href="#"><i class="fa fa-wallet"></i> Kas</a>
<a href="#"><i class="fa fa-gear"></i> Pengaturan</a>
</div>
</div>

<div class="main">
<div class="topbar">
<h2>Dashboard E-FORM</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="grid">
<div class="card"><h3>Anggota</h3><h1>56</h1></div>
<div class="card"><h3>Presensi</h3><h1>20%</h1></div>
<div class="card"><h3>Kas</h3><h1>Rp-1.5JT</h1></div>
<div class="card"><h3>Surat</h3><h1>89</h1></div>

<div class="card big">
<h3>Statistik Anggota</h3>
<canvas id="memberChart"></canvas>
</div>

<div class="card big">
<h3>Aktivitas Terbaru</h3>
<table>
<tr><th>Waktu</th><th>Aktivitas</th></tr>
<tr><td>08:00</td><td>Tambah anggota baru</td></tr>
<tr><td>09:30</td><td>Input kas masuk</td></tr>
<tr><td>11:00</td><td>Surat keluar dibuat</td></tr>
</table>
</div>
</div>
</div>

<script>

new Chart(document.getElementById('memberChart'),{
type:'bar',
data:{
labels:['Jan','Feb','Mar','Apr','Mei','Jun'],
datasets:[{label:'Anggota',data:[20,35,40,55,80,95]}]
}
});
function logout(){
 localStorage.removeItem('isLogin');
 location.href='gala.html';
}
</script>
</body>
</html>
